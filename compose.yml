name: 'pet-shop'

services:
  postgres:
    container_name: 'pet-shop-postgres'
    image: 'docker.io/postgres:17-alpine'
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DATABASE}
    ports:
      - '5432:5432'
    restart: 'always'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - pet-shop-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME} -h localhost']
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    container_name: 'pet-shop-mailpit'
    image: 'docker.io/axllent/mailpit:latest'
    ports:
      - '1025:1025'
      - '8025:8025'
    restart: 'always'
    networks:
      - pet-shop-network

volumes:
  pgdata:
    name: 'pet-shop-pgdata'

networks:
  pet-shop-network:
    name: 'pet-shop-network'
